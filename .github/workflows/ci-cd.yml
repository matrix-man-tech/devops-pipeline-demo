name: CI/CD Pipeline

# Trigger this pipeline on every push and pull request to main
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:

  # ── JOB 1: Lint ─────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest          # GitHub gives you a free Linux VM

    steps:
      - name: Checkout code
        uses: actions/checkout@v4   # Downloads your repo into the VM

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'              # Caches node_modules between runs (faster)

      - name: Install dependencies
        run: npm install

      - name: Run linter
        run: npm run lint

  # ── JOB 2: Test ─────────────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest
    needs: lint                     # Only runs if lint passes

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Run tests
        run: npm test

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/           # Saves your test coverage as a downloadable file

  # ── JOB 3: Build Docker Image ────────────────────────────────
  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: test                     # Only runs if tests pass

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t devops-demo:${{ github.sha }} .
        # github.sha = the unique commit ID — each build gets tagged uniquely

      - name: Verify container starts
        run: |
          docker run -d -p 3000:3000 --name test-container devops-demo:${{ github.sha }}
          sleep 5
          curl -f http://localhost:3000/health
          docker stop test-container

  # ── JOB 4: Deploy (simulated) ───────────────────────────────
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: build                    # Only runs if build passes
    if: github.ref == 'refs/heads/main'   # Only deploys from main branch

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Simulate deployment
        run: |
          echo "=========================================="
          echo "  Deploying devops-demo to production..."
          echo "  Commit: ${{ github.sha }}"
          echo "  Branch: ${{ github.ref_name }}"
          echo "  Triggered by: ${{ github.actor }}"
          echo "=========================================="
          echo "Deploy successful!"

      - name: Notify success
        run: echo "Pipeline complete - app is live!"