version: '3.8'

services:

  # ── Your App ──────────────────────────────────────────────
  app:
    build: .
    container_name: devops-demo-app
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── Prometheus ────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: devops-demo-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
    restart: unless-stopped
    depends_on:
      - app             # Waits for app to start first

  # ── Grafana ───────────────────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    container_name: devops-demo-grafana
    ports:
      - "3001:3000"     # Grafana runs on localhost:3001
    environment:
      
      - GF_USERS_ALLOW_SIGN_UP= false
      - GF_AUTH_ANONYMOUS_ENABLED=true
     
    volumes:
      - grafana-data:/var/lib/grafana
    restart: unless-stopped
    depends_on:
      - prometheus      # Waits for Prometheus to start first

volumes:
  grafana-data:         # Persists Grafana dashboards between restarts